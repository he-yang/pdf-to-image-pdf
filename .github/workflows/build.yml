name: Build and Package

on:
  # push:
  #   branches:
  #     - main
  release:
    types:
      - created

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            build-command: npm run build:win
            os-name: windows
            arch: x64-ia32
          - os: macos-latest
            build-command: npm run build:mac:x64 && npm run build:mac:arm64
            os-name: macos
            arch: x64-arm64
          - os: ubuntu-latest
            build-command: npm run build:linux
            os-name: linux
            arch: x64-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm install

      - name: Get version from package.json
        id: get_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build
        run: ${{ matrix.build-command }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List all files
        run: find . -name "*.exe" -o -name "*.dmg" -o -name "*.appimage" -o -name "*.tar.gz" -o -name "*.zip" 2>/dev/null || dir /s /b *.exe *.dmg *.appimage *.tar.gz *.zip 2>NUL
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdf-to-image-pdf-${{ matrix.os-name }}-${{ matrix.arch }}-${{ steps.get_version.outputs.version }}
          path: |
            **/*.exe
            **/*.dmg
            **/*.appimage
            **/*.tar.gz
            **/*.zip
          retention-days: 7

  upload-release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded files
        run: ls -la artifacts/
        shell: bash

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
