name: Build and Package

on:
  # push:
  #   branches:
  #     - main
  release:
    types:
      - created

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-14, ubuntu-latest]
        include:
          - os: windows-latest
            build-command: npm run build:win
            artifact-name: pdf-to-image-pdf-windows
          - os: macos-14
            build-command: npm run build:mac:universal
            artifact-name: pdf-to-image-pdf-macos
          - os: ubuntu-latest
            build-command: npm run build:linux
            artifact-name: pdf-to-image-pdf-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: ${{ matrix.build-command }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist-electron contents
        run: ls -la dist-electron/
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.appimage
            dist-electron/*.tar.gz
            dist-electron/*.zip
          retention-days: 7

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.appimage
            dist-electron/*.tar.gz
            dist-electron/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
